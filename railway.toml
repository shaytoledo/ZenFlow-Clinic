[build]
builder = "nixpacks"

[deploy]
# Railway runs the 'web' Procfile entry by default.
# The 'worker' entry (Telegram bots) is a separate Railway service — see deployment guide.
startCommand = "uvicorn web.app:app --host 0.0.0.0 --port $PORT"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
