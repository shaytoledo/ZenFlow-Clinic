<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZenFlow — Availability</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- Top bar -->
<header id="topbar">
  <button id="menu-btn" class="icon-btn" aria-label="Toggle sidebar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="brand">
    <span class="brand-icon">🌿</span>
    <span class="brand-name">ZenFlow</span>
    <span class="brand-sep">|</span>
    <span class="brand-sub">Availability</span>
  </div>
  <div class="topbar-spacer"></div>
  <div class="topbar-right">
    <div id="hint-badge">
      <span class="dot-available"></span>
      <span>Click a slot to mark it as available</span>
    </div>
  </div>
</header>

<!-- Main layout -->
<div id="layout">

  <!-- Sidebar -->
  <aside id="sidebar">

    <!-- Mini calendar -->
    <div id="mini-cal-wrap">
      <div id="mini-cal-header">
        <span id="mini-cal-title"></span>
      </div>
      <div id="mini-cal-grid"></div>
    </div>

    <div class="sidebar-divider"></div>

    <!-- Calendar list -->
    <div id="cal-list">
      <div id="cal-items"></div>
    </div>

  </aside>

  <!-- Calendar -->
  <main id="main">
    <div id="calendar"></div>
  </main>
</div>

<div id="overlay" class="hidden"></div>
<div id="toast"><span id="toast-icon"></span><span id="toast-msg"></span></div>

<script src="/static/app.js"></script>
</body>
</html>
