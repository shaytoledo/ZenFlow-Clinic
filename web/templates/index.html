<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZenFlow — Availability</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<!-- Top bar -->
<header id="topbar">
  <button id="menu-btn" class="icon-btn" aria-label="Toggle sidebar">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="brand">
    <span class="brand-icon">🌿</span>
    <span class="brand-name">ZenFlow</span>
    <span class="brand-sep">|</span>
    <span class="brand-sub">Availability</span>
  </div>
  <div class="topbar-spacer"></div>
  <div class="topbar-right">
    <div id="hint-badge">
      <span class="dot-available"></span>
      <span>Drag to add a slot · Click event to view details</span>
    </div>
  </div>
</header>

<!-- Main layout -->
<div id="layout">

  <!-- Sidebar -->
  <aside id="sidebar">

    <!-- Mini calendar -->
    <div id="mini-cal-wrap">
      <div id="mini-cal-header">
        <span id="mini-cal-title"></span>
      </div>
      <div id="mini-cal-grid"></div>
    </div>

    <div class="sidebar-divider"></div>

    <!-- Calendar list -->
    <div id="cal-list">
      <div id="cal-items"></div>
    </div>

  </aside>

  <!-- Calendar -->
  <main id="main">
    <div id="calendar"></div>
  </main>
</div>

<div id="overlay" class="hidden"></div>

<!-- Event detail popover -->
<div id="event-popover" class="hidden">
  <div class="pop-color-bar" id="pop-color-bar"></div>
  <div class="pop-inner">

    <div class="pop-header">
      <span class="pop-label" id="pop-title"></span>
      <button class="icon-btn sm" id="pop-close" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Time row (always shown) -->
    <div class="pop-time-row">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span id="pop-time"></span>
    </div>

    <!-- Calendar row (shown for busy events) -->
    <div class="pop-time-row hidden" id="pop-cal-row">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span id="pop-cal-name"></span>
    </div>

    <!-- Confirmation message (shown for available slots only) -->
    <div class="pop-note hidden" id="pop-confirm-msg">
      Remove this slot from your schedule?<br>Patients will no longer be able to book it.
    </div>

    <div class="pop-actions">
      <button class="btn-ghost" id="pop-close-btn">Close</button>
      <button class="btn-danger hidden" id="pop-delete-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
        Yes, remove
      </button>
    </div>

  </div>
</div>

<div id="toast"><span id="toast-icon"></span><span id="toast-msg"></span></div>

<script src="/static/app.js"></script>
</body>
</html>
