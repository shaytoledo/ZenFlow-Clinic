<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZenFlow — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f0fdf4 0%, #ccfbf1 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px 40px 44px;
      width: 100%;
      max-width: 420px;
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo-mark {
      width: 52px; height: 52px;
      background: #CCFBF1;
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 26px; margin-bottom: 10px;
    }
    .logo h1 { font-size: 20px; font-weight: 700; color: #0D9488; letter-spacing: -0.3px; }
    .logo p  { font-size: 13px; color: #6B7280; margin-top: 4px; }

    /* Tabs */
    .tabs {
      display: flex;
      border: 1.5px solid #E5E7EB;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      border: none;
      background: #F9FAFB;
      color: #6B7280;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .tab-btn.active {
      background: #0D9488;
      color: #fff;
    }
    .tab-btn:not(.active):hover { background: #F3F4F6; }

    /* Forms */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    label {
      display: block;
      font-size: 13px; font-weight: 500; color: #374151;
      margin-bottom: 6px;
    }
    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%;
      border: 1.5px solid #E5E7EB;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px; font-family: inherit; color: #111827;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 14px;
    }
    input:focus { border-color: #0D9488; }
    .btn-primary {
      width: 100%;
      background: #0D9488; color: #fff;
      border: none; border-radius: 10px;
      padding: 12px;
      font-size: 14px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-primary:hover { background: #0f766e; }
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 18px 0;
      color: #9CA3AF; font-size: 13px;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #E5E7EB;
    }
    .btn-google {
      width: 100%;
      background: #fff; color: #374151;
      border: 1.5px solid #E5E7EB;
      border-radius: 10px; padding: 11px;
      font-size: 14px; font-weight: 500; font-family: inherit;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: background 0.15s, border-color 0.15s;
      text-decoration: none;
    }
    .btn-google:hover { background: #F9FAFB; border-color: #D1D5DB; }
    .error {
      background: #FEF2F2; border: 1px solid #FECACA;
      border-radius: 8px; padding: 10px 14px;
      font-size: 13px; color: #DC2626;
      margin-bottom: 16px;
    }
    .hint { font-size: 12px; color: #9CA3AF; margin-top: 16px; text-align: center; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">🌿</div>
    <h1>ZenFlow Clinic</h1>
    <p>Therapist Portal</p>
  </div>

  <div class="tabs">
    <button class="tab-btn {% if tab == 'register' %}active{% endif %}" onclick="switchTab('register')">Register</button>
    <button class="tab-btn {% if tab == 'signin' %}active{% endif %}"   onclick="switchTab('signin')">Sign In</button>
  </div>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <!-- ── REGISTER TAB ── -->
  <div class="tab-panel {% if tab == 'register' %}active{% endif %}" id="panel-register">
    <form method="post" action="/register/signup">
      <label>Full name <span style="color:#DC2626;">*</span></label>
      <input type="text" name="name" placeholder="Dr. Jane Smith" required value="{{ name or '' }}" />

      <label>Email address <span style="color:#DC2626;">*</span></label>
      <input type="email" name="email" placeholder="jane@clinic.com" required value="{{ email or '' }}" />

      <label>Password <span style="color:#DC2626;">*</span></label>
      <input type="password" name="password" placeholder="Create a password" required />

      <button type="submit" class="btn-primary">Create Account &amp; Get Code</button>
    </form>

    {% if google_enabled %}
    <div class="divider">or</div>
    <a href="/register/google" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </a>
    {% endif %}
    <p class="hint">Already have an account? <a href="#" onclick="switchTab('signin')" style="color:#0D9488;font-weight:500;">Sign in</a></p>
  </div>

  <!-- ── SIGN IN TAB ── -->
  <div class="tab-panel {% if tab == 'signin' %}active{% endif %}" id="panel-signin">
    <form method="post" action="/register/signin">
      <label>Email address</label>
      <input type="email" name="email" placeholder="jane@clinic.com" required value="{{ email or '' }}" />

      <label>Password</label>
      <input type="password" name="password" placeholder="Your password" required />

      <button type="submit" class="btn-primary">Sign In</button>
    </form>

    {% if google_enabled %}
    <div class="divider">or</div>
    <a href="/register/google" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </a>
    {% endif %}
    <p class="hint">New here? <a href="#" onclick="switchTab('register')" style="color:#0D9488;font-weight:500;">Create an account</a></p>
  </div>
</div>

<script>
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelector('#panel-' + name).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.textContent.trim().toLowerCase() === name ||
        (name === 'signin' && b.textContent.trim() === 'Sign In') ||
        (name === 'register' && b.textContent.trim() === 'Register')) {
      b.classList.add('active');
    }
  });
}
</script>
</body>
</html>
